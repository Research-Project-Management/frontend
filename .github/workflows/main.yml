name: Deploy Flux Application

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD}}
          script: |
            cd /root/app/NCKH/Flux
            git pull origin main
            npm i
            npm run build
            pm2 restart Flux
